<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>gothgirls.lol</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, sans-serif;
    height: 100vh;
    background: #000;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}


.bg {
    position: fixed;
    inset: 0;
    z-index: 0;
}

.glow1, .glow2 {
    position: absolute;
    width: 600px;
    height: 600px;
    background: #fff;
    filter: blur(160px);
    opacity: 0.18;
}

.glow1 {
    top: -220px;
    left: -220px;
}

.glow2 {
    bottom: -260px;
    right: -260px;
}


.container {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 520px;
    padding: 20px;
}


.brand {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 24px;
}


.claim-box {
    margin-top: 28px;
    display: flex;
    justify-content: center;
}

.input-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid #222;
    background: rgba(255,255,255,0.03);
    border-radius: 999px;
    padding: 6px 6px 6px 14px;
    backdrop-filter: blur(12px);
}

.prefix {
    font-size: 12px;
    color: #aaa;
    font-family: monospace;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 13px;
    width: 130px;
}

button {
    background: #fff;
    border: none;
    color: #000;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.85;
    transform: scale(1.03);
}


.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 999;
}

.popup.active {
    opacity: 1;
    pointer-events: all;
}

.popup-box {
    width: 320px;
    padding: 26px;
    border-radius: 18px;
    background: #0f0f0f;
    border: 1px solid #333;
    text-align: center;

    transform: translateY(8px) scale(0.96);
    transition: 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.popup.active .popup-box {
    transform: translateY(0) scale(1);
}

.popup-text {
    font-size: 15px;
    color: #fff;
}

.popup-text::before {
    content: "";
    display: block;
    height: 1px;
    background: #2a2a2a;
    margin-bottom: 14px;
}
</style>
</head>

<body>

<div class="bg">
    <div class="glow1"></div>
    <div class="glow2"></div>
</div>

<div class="container">
    <div class="brand">gothgirls.lol</div>

    <div class="claim-box">
        <div class="input-wrapper">
            <span class="prefix">gothgirls.lol/</span>
            <input type="text" placeholder="username"/>
            <button onclick="handleClaim()">claim</button>
        </div>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-text">closed access as of right now</div>
    </div>
</div>

<script>
function handleClaim() {
    document.getElementById("popup").classList.add("active");
}

document.getElementById("popup").addEventListener("click", (e) => {
    if (e.target.id === "popup") {
        document.getElementById("popup").classList.remove("active");
    }
});
</script>

</body>
</html>
