<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>racify</title>
	<link rel="icon" type="image/png" href="favicon3.png">

	<style>
		@font-face {
			font-family: "MinecraftRegular";
			src: url("./MinecraftRegular-Bmg3.otf") format("opentype");
			font-weight: normal;
			font-style: normal;
			font-display: swap;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html,
		body {
			width: 100%;
			min-height: 100%;
		}

		body {
			min-height: 100vh;
			background: #000;
			color: #f4f4f5;
			font-family: Arial, Helvetica, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
			overflow: hidden;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			z-index: 0;
			pointer-events: none;
			background:
				radial-gradient(circle at 6% 52%, rgba(255, 255, 255, 0.7) 0 1px, transparent 2px),
				radial-gradient(circle at 12% 25%, rgba(255, 255, 255, 0.5) 0 1px, transparent 2px),
				radial-gradient(circle at 18% 68%, rgba(255, 255, 255, 0.35) 0 1px, transparent 2px),
				radial-gradient(circle at 24% 17%, rgba(255, 255, 255, 0.35) 0 1px, transparent 2px),
				radial-gradient(circle at 35% 80%, rgba(255, 255, 255, 0.65) 0 1px, transparent 2px),
				radial-gradient(circle at 51% 8%, rgba(255, 255, 255, 0.65) 0 1px, transparent 2px),
				radial-gradient(circle at 62% 62%, rgba(255, 255, 255, 0.4) 0 1px, transparent 2px),
				radial-gradient(circle at 72% 43%, rgba(255, 255, 255, 0.35) 0 1px, transparent 2px),
				radial-gradient(circle at 84% 70%, rgba(255, 255, 255, 0.85) 0 1px, transparent 2px),
				radial-gradient(circle at 92% 20%, rgba(255, 255, 255, 0.42) 0 1px, transparent 2px),
				radial-gradient(circle at 77% 84%, rgba(255, 255, 255, 0.42) 0 1px, transparent 2px);
			opacity: 0.8;
		}

		.constellation-bg {
			position: fixed;
			inset: 0;
			z-index: 1;
			width: 100%;
			height: 100%;
			pointer-events: none;
			opacity: 0.85;
		}

		button,
		a {
			font: inherit;
		}

		button {
			border: 0;
			background: none;
			cursor: pointer;
		}

		.page-card {
			position: relative;
			z-index: 10;
			width: 100%;
			max-width: 448px;
			border-radius: 4px;
			border: 1px solid rgba(39, 39, 42, 0.3);
			overflow: hidden;
			background-color: rgba(0, 0, 0, 0.65);
			box-shadow: 0 22px 80px rgba(0, 0, 0, 0.65);
			transition: transform 0.1s ease-out;
			transform-style: preserve-3d;
			backface-visibility: hidden;
			-webkit-backface-visibility: hidden;
			transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0);
			-webkit-font-smoothing: subpixel-antialiased;
			opacity: 0;
			animation: cardEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			animation-delay: 1.1s;
		}

		@keyframes cardEntry {
			from {
				opacity: 0;
				transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(-50px) scale(0.96);
			}

			to {
				opacity: 1;
				transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0) scale(1);
			}
		}

		.tabs-header {
			display: flex;
			align-items: center;
			padding: 12px;
			border-bottom: 1px solid rgba(39, 39, 42, 0.3);
			background-color: rgba(0, 0, 0, 0.7);
			gap: 8px;
		}

		.tabs-container {
			display: flex;
			min-width: 0;
			overflow: hidden;
			flex: 1;
		}

		.tab-button {
			color: #71717a;
			padding: 8px 8px;
			font-size: 12px;
			transition: color 0.2s ease;
			white-space: nowrap;
			flex-shrink: 0;
			border: none;
			background: none;
			cursor: pointer;
		}

		.tab-button:hover {
			color: #fff;
		}

		.tab-button.active {
			color: #fff;
		}

		.tab-content {
			display: none;
		}

		.tab-content.active {
			display: block;
			animation: fadeInDown 0.4s ease-out;
		}

		@keyframes fadeInDown {
			from {
				opacity: 0;
				transform: translateY(-10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.views-button {
			display: flex;
			align-items: center;
			gap: 4px;
			background: rgba(24, 24, 27, 0.62);
			border: 1px solid rgba(255, 255, 255, 0.04);
			border-radius: 999px;
			padding: 3px 8px;
			font-size: 10.4px;
			line-height: 14px;
			color: #9ca3af;
			white-space: nowrap;
			transition: background 0.2s ease;
			margin-left: auto;
			flex-shrink: 0;
			cursor: pointer;
		}

		.views-button:hover {
			background: rgba(39, 39, 42, 0.68);
		}

		.views-button svg {
			color: #71717a;
		}

		.content {
			padding: 16px;
		}

		.project-card {
			display: block;
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.08);
			overflow: hidden;
			background: radial-gradient(at left top, #5c5c5c28 0%, transparent 55%),
				radial-gradient(at right bottom, #5c5c5c28 0%, transparent 55%),
				rgba(10, 10, 10, 0.5);
			backdrop-filter: blur(24px);
			box-shadow: rgba(255, 255, 255, 0.05) 0 1px 0 inset;
			margin-bottom: 16px;
			transition: background 0.3s ease;
		}

		.project-card:hover {
			background: radial-gradient(at left top, #5f5f5f85 0%, transparent 55%),
				radial-gradient(at right bottom, #5f5f5f85 0%, transparent 55%),
				rgba(15, 15, 15, 0.55);
		}

		.project-header {
			position: relative;
			z-index: 10;
			padding: 12px;
		}

		.project-top {
			display: flex;
			align-items: flex-start;
			gap: 12px;
			margin-bottom: 12px;
		}

		.project-icon {
			width: 36px;
			height: 36px;
			border-radius: 8px;
			object-fit: cover;
			flex-shrink: 0;
			box-shadow: rgba(255, 255, 255, 0.08) 0 0 0 1px, rgba(0, 0, 0, 0.4) 0 4px 12px;
		}

		.project-info {
			flex: 1;
			min-width: 0;
		}

		.project-title-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 4px;
			gap: 8px;
		}

		.project-title {
			font-size: 14px;
			font-weight: 600;
			color: #fff;
		}

		.project-link {
			color: #71717a;
			transition: color 0.2s ease;
			flex-shrink: 0;
		}

		.project-link:hover {
			color: #fff;
		}

		.project-description {
			font-size: 11px;
			color: #9ca3af;
			line-height: 1.4;
			margin: 8px 0;
		}

		.project-footer {
			margin-top: 12px;
			padding-top: 12px;
			border-top: 1px solid rgba(255, 255, 255, 0.06);
		}

		.project-server {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.server-info {
			flex: 1;
		}

		.server-stats {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-top: 2px;
			font-size: 9px;
		}

		.server-stat {
			display: flex;
			align-items: center;
			gap: 3px;
			color: #71717a;
		}

		.status-indicator {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			display: inline-block;
		}

		.server-join {
			padding: 4px 12px;
			font-size: 10px;
			border-radius: 4px;
			border: 1px solid rgba(255, 255, 255, 0.08);
			background: rgba(255, 255, 255, 0.04);
			color: #9ca3af;
			cursor: pointer;
			transition: color 0.2s ease;
			text-decoration: none;
		}

		.server-join:hover {
			color: #fff;
			border-color: rgba(255, 255, 255, 0.2);
		}

		.hero {
			margin-bottom: 24px;
		}

		.hero-top {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 14px;
		}

		.hero-text {
			min-width: 0;
			flex: 1;
		}

		.hero-actions {
			display: flex;
			align-items: center;
			flex-shrink: 0;
			padding-top: 2px;
		}

		.logo {
			font-family:
				"MinecraftRegular",
				"Courier New",
				monospace;
			font-size: 32px;
			font-weight: 400;
			line-height: 0.8;
			margin-bottom: 8px;
			letter-spacing: 0.02em;
			color: #fff;
			text-transform: lowercase;
			-webkit-font-smoothing: none;
			-moz-osx-font-smoothing: grayscale;
			font-smooth: never;
			text-rendering: optimizeSpeed;
			transform: translateY(1px);
		}

		.subtitle {
			font-size: 12px;
			line-height: 1.15;
			color: #9ca3af;
			max-width: 310px;
		}

		.views {
			display: flex;
			align-items: center;
			gap: 4px;
			background: rgba(24, 24, 27, 0.62);
			border: 1px solid rgba(255, 255, 255, 0.04);
			border-radius: 999px;
			padding: 3px 8px;
			font-size: 10.4px;
			line-height: 14px;
			color: #9ca3af;
			white-space: nowrap;
			transition: background 0.2s ease;
		}

		.views:hover {
			background: rgba(39, 39, 42, 0.68);
		}

		.views svg {
			color: #71717a;
		}

		.discord-shell {
			background: transparent;
			border-radius: 4px;
			border: none;
			margin-bottom: 14px;
			padding: 0;
		}

		.discord-card {
			display: flex;
			align-items: flex-start;
			gap: 8px;
			position: relative;
			overflow: hidden;
			border-radius: 6px;
			padding: 8px;
			background: rgba(0, 0, 0, 0.3);
			border: 1px solid rgba(39, 39, 42, 0.4);
		}

		.discord-card::before {
			content: "";
			position: absolute;
			inset: 0;
			background: transparent;
			box-shadow: rgba(255, 255, 255, 0.1) 0px 0px 0px 1px inset;
			pointer-events: none;
			border-radius: 6px;
		}

		.avatar-wrap {
			position: relative;
			flex-shrink: 0;
			width: 30px;
			height: 30px;
			z-index: 10;
		}

		.avatar {
			width: 30px;
			height: 30px;
			border-radius: 999px;
			object-fit: cover;
			display: block;
			background: #18181b;
		}

		.status-dot {
			position: absolute;
			right: 0;
			bottom: 0;
			width: 8px;
			height: 8px;
			border-radius: 999px;
			border: 2px solid #18181b;
			background: #71717a;
		}

		.status-online {
			background: #22c55e;
		}

		.status-idle {
			background: #f59e0b;
		}

		.status-dnd {
			background: #ef4444;
		}

		.status-offline {
			background: #71717a;
		}

		.discord-info {
			display: flex;
			flex-direction: column;
			flex: 1;
			min-width: 0;
			position: relative;
			z-index: 10;
		}

		.discord-top {
			width: 100%;
			display: flex;
			align-items: center;
			gap: 4px;
			min-width: 0;
			margin-bottom: 4px;
		}

		.discord-name {
			font-size: 12px;
			line-height: 14px;
			color: #e5e7eb;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.badges {
			display: flex;
			align-items: center;
			gap: 3px;
			flex-shrink: 0;
		}

		.badge-img {
			width: 16px;
			height: 16px;
			object-fit: contain;
			opacity: 0.7;
		}

		.discord-tag-row {
			display: flex;
			align-items: center;
			gap: 6px;
			min-width: 0;
		}

		.discord-tag-btn {
			position: relative;
			width: fit-content;
			outline: none;
			user-select: none;
			cursor: pointer;
			flex-shrink: 0;
		}

		.discord-tag {
			position: relative;
			display: block;
			font-size: 11px;
			line-height: 1;
			color: #9ca3af;
		}

		.discord-tag::after {
			content: "";
			position: absolute;
			bottom: 0;
			left: 0;
			width: 100%;
			height: 1px;
			background: #9ca3af;
			transform: scaleX(0);
			transform-origin: left;
			transition: transform 0.3s ease;
		}

		.discord-tag-btn:hover .discord-tag::after {
			transform: scaleX(1);
		}

		.discord-separator {
			width: 100%;
			height: 1px;
			background: rgba(255, 255, 255, 0.08);
			margin: 4px 0;
		}

		.discord-status-line {
			width: 100%;
			font-size: 10px;
			color: #9ca3af;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.discord-activity {
			display: none !important;
			grid-column: 1 / -1;
			grid-row: 2;
			height: 0;
			padding: 0;
			margin: 0;
			align-items: center;
			justify-content: flex-start;
			gap: 8px;
			width: 100%;
			border-radius: 8px;
			text-align: left;
			background:
				linear-gradient(135deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018)),
				rgba(0, 0, 0, 0.22);
			border: 1px solid rgba(255, 255, 255, 0.055);
			box-shadow:
				rgba(255, 255, 255, 0.035) 0 1px 0 inset,
				rgba(0, 0, 0, 0.18) 0 8px 18px;
			color: #9ca3af;
		}

		.discord-activity.show {
			display: flex !important;
			height: auto;
			padding: 7px 8px;
			margin: 0;
		}

		.activity-icon {
			width: 28px;
			height: 28px;
			border-radius: 7px;
			background: #18181b;
			object-fit: cover;
			flex-shrink: 0;
			box-shadow:
				rgba(255, 255, 255, 0.07) 0 0 0 1px,
				rgba(0, 0, 0, 0.25) 0 4px 10px;
		}

		.activity-dot-icon {
			width: 28px;
			height: 28px;
			border-radius: 7px;
			background:
				radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.55) 0 2px, transparent 3px),
				rgba(255, 255, 255, 0.045);
			border: 1px solid rgba(255, 255, 255, 0.06);
			flex-shrink: 0;
			box-shadow: rgba(0, 0, 0, 0.25) 0 4px 10px;
		}

		.activity-text {
			min-width: 0;
			flex: 1;
			text-align: left;
		}

		.activity-label {
			font-size: 8.5px;
			line-height: 1;
			margin-bottom: 4px;
			color: #71717a;
			text-transform: uppercase;
			letter-spacing: 0.04em;
			text-align: left;
		}

		.activity-name {
			font-size: 11px;
			line-height: 1.2;
			color: #e5e7eb;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			text-align: left;
		}

		.activity-details {
			display: block;
			font-size: 9.5px;
			line-height: 1.2;
			margin-top: 2px;
			color: #9ca3af;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			text-align: left;
		}

		.socials-dropdown {
			position: relative;
			margin: 0 0 24px;
			width: 100%;
		}

		.socials-toggle {
			display: none;
		}

		.socials-toggle:hover,
		.socials-toggle.open {
			color: #fff;
			background: rgba(255, 255, 255, 0.04);
			border-color: rgba(255, 255, 255, 0.1);
		}

		.socials-toggle-left {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 12px;
		}

		.socials-chevron {
			color: #71717a;
			transition: transform 0.25s ease;
		}

		.socials-toggle.open .socials-chevron {
			transform: rotate(180deg);
		}

		.socials-panel {
			overflow: visible;
			opacity: 1;
			transform: none;
			padding: 0;
			margin: 0;
			max-height: none;
		}

		.socials-wrap {
			width: 100%;
			margin: 0;
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			justify-content: flex-start;
			gap: 8px;
			padding: 10px;
			border-radius: 10px;
			background:
				radial-gradient(at left top, rgba(255, 255, 255, 0.055) 0%, transparent 55%),
				radial-gradient(at right bottom, rgba(255, 255, 255, 0.035) 0%, transparent 55%),
				rgba(0, 0, 0, 0.36);
			border: 1px solid rgba(255, 255, 255, 0.06);
			box-shadow:
				rgba(255, 255, 255, 0.05) 0 1px 0 inset,
				rgba(0, 0, 0, 0.22) 0 12px 28px;
			backdrop-filter: blur(18px);
		}

		.social-list {
			width: max-content;
			display: flex;
			flex-direction: column;
			gap: 8px;
			margin: 0;
			align-items: flex-start;
		}

		.social-row {
			display: grid;
			grid-template-columns: 18px max-content;
			align-items: center;
			column-gap: 8px;
			color: #9ca3af;
			font-size: 12px;
			line-height: 1;
			padding: 4px 0;
		}

		.social-row a {
			color: inherit;
			text-decoration: none;
			transition: color 0.2s ease;
			text-align: left;
			white-space: nowrap;
			display: block;
		}

		.social-row a:hover {
			color: #fff;
		}

		.social-icon {
			width: 14px;
			height: 14px;
			justify-self: center;
			display: block;
			flex-shrink: 0;
			color: #9ca3af;
		}

		.notification {
			position: fixed;
			bottom: 24px;
			left: 50%;
			transform: translateX(-50%) translateY(0);
			background:
				linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
				rgba(0, 0, 0, 0.75);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			color: #e5e7eb;
			padding: 10px 16px;
			border-radius: 999px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			box-shadow:
				rgba(255, 255, 255, 0.06) 0 1px 0 inset,
				rgba(0, 0, 0, 0.4) 0 8px 24px;
			font-size: 12px;
			white-space: nowrap;
			display: flex;
			align-items: center;
			gap: 8px;
			animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
			z-index: 9999;
		}

		.notification-icon {
			width: 14px;
			height: 14px;
			color: #a1a1aa;
			flex-shrink: 0;
		}

		/* ── Music Player ── */
		.music-player-title {
			font-size: 11px;
			color: #a1a1aa;
			margin-top: 16px;
			margin-bottom: 6px;
			padding-left: 2px;
		}

		.music-player {
			border-radius: 8px;
			border: 1px solid rgba(255, 255, 255, 0.04);
			background: rgba(10, 10, 10, 0.6);
			backdrop-filter: blur(12px);
			overflow: hidden;
		}

		.mp-top {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 12px;
		}

		.mp-art {
			width: 42px;
			height: 42px;
			border-radius: 4px;
			object-fit: cover;
			background: #18181b;
			flex-shrink: 0;
		}

		.mp-meta {
			flex: 1;
			min-width: 0;
		}

		.mp-title {
			font-size: 13px;
			font-weight: 500;
			color: #fff;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			line-height: 1.2;
		}

		.mp-artist {
			font-size: 11px;
			color: #71717a;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-top: 4px;
		}

		.mp-controls {
			display: flex;
			align-items: center;

		function formatTime(ms) {
			if (!ms || ms < 0) return "0:00";

			const totalSeconds = Math.floor(ms / 1000);
			const minutes = Math.floor(totalSeconds / 60);
			const seconds = totalSeconds % 60;

			return `${minutes}:${String(seconds).padStart(2, "0")}`;
		}

		function updateSpotifyProgress() {
			if (!currentSpotify) return;

			const start = currentSpotify.timestamps?.start || 0;
			const end = currentSpotify.timestamps?.end || 0;
			const now = Date.now();

			const duration = end - start;
			const elapsed = now - start;

			const safeElapsed = Math.min(Math.max(elapsed, 0), duration || 0);
			const progress = duration > 0
				? Math.min(100, Math.max(0, safeElapsed / duration * 100))
				: 0;

			const progressEl = document.getElementById("spotify-progress-fill");
			const timeEl = document.getElementById("spotify-time");

			if (progressEl) {
				const remaining = Math.max(0, (duration - elapsed) / 1000);
				progressEl.style.transitionDuration = `${remaining}s`;
				progressEl.style.width = `${progress}%`;
			}
			if (timeEl) timeEl.textContent = `${formatTime(safeElapsed)} / ${formatTime(duration)}`;
		}

		function getActivityImage(activity) {
			if (!activity) return null;

			const largeImage = activity.assets?.large_image;
			const smallImage = activity.assets?.small_image;
			const image = largeImage || smallImage;

			if (!image) {
				if (activity.application_id) {
					return `https://cdn.discordapp.com/app-icons/${activity.application_id}/0.png`;
				}
				return null;
			}

			if (image.startsWith("mp:external/")) {
				return `https://media.discordapp.net/external/${image.substring(12)}`;
			}

			if (image.startsWith("spotify:")) {
				return null;
			}

			if (image.startsWith("https://") || image.startsWith("http://")) {
				return image;
			}

			if (activity.application_id) {
				return `https://cdn.discordapp.com/app-assets/${activity.application_id}/${image}.png`;
			}

			return null;
		}

		function getActivityDetails(activity) {
			const parts = [];

			if (activity.details) parts.push(activity.details);
			if (activity.state) parts.push(activity.state);

			if (!parts.length) return "Active now";

			return parts.join(" • ");
		}

		function renderActivity(activities = [], customStatus = null) {
			const activityDisplayEl = document.getElementById("activity-display");
			if (!activityDisplayEl) return;

			currentActivities = activities;

			const validActivities = activities.filter((item) => {
				if (!item) return false;
				if (item.name === "Spotify") return false;
				if (item.type === 4) return false;
				return true;
			});

			if (!validActivities.length) {
				activityDisplayEl.innerHTML = "";
				return;
			}

			activityDisplayEl.innerHTML = validActivities.map(activity => {
				const activityName = activity.name || "Activity";
				const activityDetails = activity.details || "";
				const activityState = activity.state || "";
				const activityImage = getActivityImage(activity);

				let elapsedTime = "";
				if (activity.timestamps && activity.timestamps.start) {
					const elapsed = Date.now() - activity.timestamps.start;
					const seconds = Math.floor(elapsed / 1000);
					const minutes = Math.floor(seconds / 60);
					const hours = Math.floor(minutes / 60);

					if (hours > 0) {
						elapsedTime = `${hours}h ${minutes % 60}m`;
					} else if (minutes > 0) {
						elapsedTime = `${minutes}m ${seconds % 60}s`;
					} else {
						elapsedTime = `${seconds}s`;
					}
				}

				return `
					<div class="activity-row">
						${activityImage ? `<img class="activity-art" src="${escapeHTML(activityImage)}" alt="${escapeHTML(activityName)}" onerror="this.style.display='none'"/>` : '<div class="activity-art"></div>'}
						<div class="activity-info">
							<div class="activity-name">${escapeHTML(activityName)}</div>
							${activityDetails ? `<div class="activity-detail-line">${escapeHTML(activityDetails)}</div>` : ""}
							${activityState ? `<div class="activity-state-line">${escapeHTML(activityState)}</div>` : ""}
							${elapsedTime ? `<div class="activity-time-line">${elapsedTime}</div>` : ""}
						</div>
					</div>
				`;
			}).join("");
		}

				usernameEl.textContent = username || " ";
				discordTagEl.textContent = user.username ? `@${user.username}` : " ";

					avatarEl.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${avatarExtension}?size=128`;

					avatarEl.src = `https://cdn.discordapp.com/embed/avatars/${fallbackIndex}.png`;
				}
			}

			setStatus(data.discord_status);
			renderActivity(data.activities || [], data.discord_user?.custom_status);

			const incomingTrackId = incomingSpotify
				? incomingSpotify.track_id || `${incomingSpotify.song}-${incomingSpotify.artist}-${incomingSpotify.album}`
				: null;

		async function fetchDiscordOnce() {
			try {
				const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
				const json = await response.json();

				if (!json.success || !json.data) {
					document.body.classList.remove("is-loading");
					return;
				}

				applyLanyardData(json.data);
			} catch (err) {
				console.error("Failed to fetch Lanyard:", err);
				document.body.classList.remove("is-loading");
			}
		}

		function connectLanyardSocket() {
			if (socket) {
				socket.close();
			}

			socket = new WebSocket("wss://api.lanyard.rest/socket");

			socket.addEventListener("message", (event) => {
				const message = JSON.parse(event.data);

				if (message.op === 1) {
					if (heartbeatInterval) clearInterval(heartbeatInterval);

					heartbeatInterval = setInterval(() => {
						if (socket && socket.readyState === WebSocket.OPEN) {
							socket.send(JSON.stringify({ op: 3 }));
						}
					}, message.d.heartbeat_interval);

					socket.send(JSON.stringify({
						op: 2,
						d: {
							subscribe_to_id: DISCORD_ID
						}
					}));
				}

				if (message.t === "INIT_STATE") {
					applyLanyardData(message.d);
				}

				if (message.t === "PRESENCE_UPDATE") {
					applyLanyardData(message.d);
				}
			});

			socket.addEventListener("close", () => {
				if (heartbeatInterval) {
					clearInterval(heartbeatInterval);
					heartbeatInterval = null;
				}

				if (reconnectTimer) clearTimeout(reconnectTimer);
				reconnectTimer = setTimeout(connectLanyardSocket, 5000);
			});

			socket.addEventListener("error", () => {
				if (socket) socket.close();
			});
		}

		function createConstellationBackground() {
			const canvas = document.getElementById("constellation-bg");
			if (!canvas) return;

			const ctx = canvas.getContext("2d");
			const dpr = window.devicePixelRatio || 1;

			let width = 0;
			let height = 0;
			let stars = [];
			let mouse = {
				x: -9999,
				y: -9999
			};

			function resize() {
				width = window.innerWidth;
				height = window.innerHeight;

				canvas.width = width * dpr;
				canvas.height = height * dpr;
				canvas.style.width = `${width}px`;
				canvas.style.height = `${height}px`;

				ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

				const count = Math.floor((width * height) / 14500);

				stars = Array.from({ length: Math.max(45, Math.min(count, 95)) }, () => ({
					x: Math.random() * width,
					y: Math.random() * height,
					vx: (Math.random() - 0.5) * 0.12,
					vy: (Math.random() - 0.5) * 0.12,
					size: Math.random() * 1.4 + 0.45,
					alpha: Math.random() * 0.55 + 0.25
				}));
			}

			function draw() {
				ctx.clearRect(0, 0, width, height);

				for (const star of stars) {
					const dx = star.x - mouse.x;
					const dy = star.y - mouse.y;
					const distance = Math.sqrt(dx * dx + dy * dy);

					if (distance < 120) {
						const force = (1 - distance / 120) * 1.8;
						const angle = Math.atan2(dy, dx);

						star.x += Math.cos(angle) * force;
						star.y += Math.sin(angle) * force;
					}

					star.x += star.vx;
					star.y += star.vy;

					if (star.x < -20) star.x = width + 20;
					if (star.x > width + 20) star.x = -20;
					if (star.y < -20) star.y = height + 20;
					if (star.y > height + 20) star.y = -20;

					ctx.beginPath();
					ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
					ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
					ctx.fill();
				}

				for (let i = 0; i < stars.length; i++) {
					for (let j = i + 1; j < stars.length; j++) {
						const a = stars[i];
						const b = stars[j];

						const dx = a.x - b.x;
						const dy = a.y - b.y;
						const distance = Math.sqrt(dx * dx + dy * dy);

						if (distance < 115) {
							const opacity = (1 - distance / 115) * 0.18;

							ctx.beginPath();
							ctx.moveTo(a.x, a.y);
							ctx.lineTo(b.x, b.y);
							ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
							ctx.lineWidth = 1;
							ctx.stroke();
						}
					}
				}

				for (const star of stars) {
					const dx = star.x - mouse.x;
					const dy = star.y - mouse.y;
					const distance = Math.sqrt(dx * dx + dy * dy);

					if (distance < 165) {
						const opacity = (1 - distance / 165) * 0.28;

						ctx.beginPath();
						ctx.moveTo(star.x, star.y);
						ctx.lineTo(mouse.x, mouse.y);
						ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
						ctx.lineWidth = 1;
						ctx.stroke();
					}
				}

				requestAnimationFrame(draw);
			}

			window.addEventListener("mousemove", (event) => {
				mouse.x = event.clientX;
				mouse.y = event.clientY;
			});

			window.addEventListener("mouseleave", () => {
				mouse.x = -9999;
				mouse.y = -9999;
			});

			window.addEventListener("resize", resize);

			resize();
			draw();
		}

		const pageCard = document.querySelector(".page-card");

		if (pageCard) {
			let ticking = false;

			pageCard.addEventListener("mousemove", (e) => {
				if (!ticking) {
					window.requestAnimationFrame(() => {
						const rect = pageCard.getBoundingClientRect();
						const centerX = rect.left + rect.width / 2;
						const centerY = rect.top + rect.height / 2;

						const angleX = ((e.clientY - centerY) / (rect.height / 2) * 5).toFixed(2);
						const angleY = ((centerX - e.clientX) / (rect.width / 2) * 5).toFixed(2);

						pageCard.style.transition = "none";
						pageCard.style.transform = `perspective(1000px) rotateX(${angleX}deg) rotateY(${angleY}deg) translateZ(0)`;
						ticking = false;
					});
					ticking = true;
				}
			});

			pageCard.addEventListener("mouseleave", () => {
				pageCard.style.transition = "transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)";
				pageCard.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0)`;
			});
		}

		fetchDiscordOnce();
		fetchDiscordGuildData();
		connectLanyardSocket();
		createConstellationBackground();

		setInterval(updateActivityTimes, 1000);


		window.addEventListener("DOMContentLoaded", () => {
			const progressEl = document.getElementById("loader-progress");
			const loaderContent = document.getElementById("loader-content");
			const enterBtn = document.getElementById("enter-button");

			if (progressEl) progressEl.style.width = "100%";

			setTimeout(() => {
				if (loaderContent) loaderContent.classList.add("fade-out");
				setTimeout(() => {
					if (loaderContent) loaderContent.style.display = "none";
					if (enterBtn) enterBtn.classList.add("show");
				}, 500);
			}, 1300);
		});

		function enterSite() {
			const overlayEl = document.getElementById("loading-overlay");
			if (overlayEl) {
				overlayEl.classList.add("fade-out");
				setTimeout(() => {
					overlayEl.remove();
				}, 400);
			}

			if (mpTracks.length > 0) {
				mpIsPlaying = true;
				mpAudio.play().catch(e => console.log("Autoplay blocked:", e));
				const playIcon = document.getElementById("mp-play-icon");
				if (playIcon) playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
			}
		}



		const mpTracks = [

			{ title: "Lust", artist: "Lil Skies", src: "lust.mp3", art: "song1.png" },
			{ title: "City", artist: "packrunner", src: "City.mp3", art: "song2.png" },
			{ title: "Homecoming", artist: "Mike Sherm", src: "Homecoming.mp3", art: "song3.png" },
			{ title: "Love Letter", artist: "FRosTydaSnowMann", src: "loveletter.mp3", art: "song4.png" },
		];

		let mpIndex = 0;
		let mpAudio = new Audio();
		let mpIsPlaying = false;
		let mpIsDragging = false;

		const elMpTitle = document.getElementById("mp-title");
		const elMpArtist = document.getElementById("mp-artist");
		const elMpArt = document.getElementById("mp-art");
		const elMpTimeCombined = document.getElementById("mp-time-combined");
		const elMpProgressFill = document.getElementById("mp-progress-fill");
		const elMpProgressWrap = document.getElementById("mp-progress-wrap");
		const elMpPlayIcon = document.getElementById("mp-play-icon");
		const elMpVolSlider = document.getElementById("mp-vol-slider");

		function formatMpTime(seconds) {
			if (isNaN(seconds)) return "0:00";
			const m = Math.floor(seconds / 60);
			const s = Math.floor(seconds % 60);
			return `${m}:${s < 10 ? "0" : ""}${s}`;
		}

		function loadMpTrack(index) {
			if (mpTracks.length === 0) return;
			const track = mpTracks[index];
			mpAudio.src = track.src;
			elMpTitle.textContent = track.title;
			elMpArtist.textContent = track.artist;
			elMpArt.src = track.art || "";

			if (mpIsPlaying) {
				const playPromise = mpAudio.play();
				if (playPromise !== undefined) {
					playPromise.catch(error => {
						console.log("Autoplay prevented by browser:", error);
						mpIsPlaying = false;
						elMpPlayIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
					});
				}
			}
		}

		function mpToggle() {
			if (mpTracks.length === 0) return;
			if (mpIsPlaying) {
				mpAudio.pause();
			} else {
				mpAudio.play();
			}
		}

		function mpNext() {
			if (mpTracks.length === 0) return;
			mpIndex = (mpIndex + 1) % mpTracks.length;
			loadMpTrack(mpIndex);
		}

		function mpPrev() {
			if (mpTracks.length === 0) return;
			mpIndex = (mpIndex - 1 + mpTracks.length) % mpTracks.length;
			loadMpTrack(mpIndex);
		}

		function mpSetVolume(val) {
			mpAudio.volume = val;
			mpAudio.muted = false;
		}

		function mpToggleMute() {
			mpAudio.muted = !mpAudio.muted;
		}

		mpAudio.addEventListener("play", () => {
			mpIsPlaying = true;
			elMpPlayIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
		});

		mpAudio.addEventListener("pause", () => {
			if (!mpAudio.ended) {
				mpIsPlaying = false;
				elMpPlayIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
			}
		});

		mpAudio.addEventListener("ended", mpNext);

		mpAudio.addEventListener("timeupdate", () => {
			if (mpIsDragging) return;
			const duration = mpAudio.duration;
			const currentTime = mpAudio.currentTime;
			if (duration > 0) {
				elMpProgressFill.style.width = `${(currentTime / duration) * 100}%`;
				elMpTimeCombined.textContent = `${formatMpTime(currentTime)} / ${formatMpTime(duration)}`;
			}
		});

		mpAudio.addEventListener("loadedmetadata", () => {
			elMpTimeCombined.textContent = `0:00 / ${formatMpTime(mpAudio.duration)}`;
		});

		elMpProgressWrap.addEventListener("mousedown", (e) => {
			if (mpTracks.length === 0) return;
			mpIsDragging = true;
			mpUpdateSeek(e);
		});

		window.addEventListener("mousemove", (e) => {
			if (mpIsDragging) mpUpdateSeek(e);
		});

		window.addEventListener("mouseup", (e) => {
			if (mpIsDragging) {
				mpUpdateSeek(e);
				mpIsDragging = false;
			}
		});

		function mpUpdateSeek(e) {
			if (!mpAudio.duration) return;
			const rect = elMpProgressWrap.getBoundingClientRect();
			let pos = (e.clientX - rect.left) / rect.width;
			pos = Math.max(0, Math.min(1, pos));
			elMpProgressFill.style.width = `${pos * 100}%`;
			mpAudio.currentTime = pos * mpAudio.duration;
		}

		if (mpTracks.length > 0) {
			loadMpTrack(mpIndex);
			mpAudio.volume = parseFloat(elMpVolSlider.value);
		} else {
			elMpTitle.textContent = "No tracks added";
		}
	</script>
